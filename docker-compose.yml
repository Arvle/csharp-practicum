services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/app/cmd/api/csharppracticum.db
      - JWT_SECRET=your-secret-key-change-me
      - TEACHER_ACCESS_CODE=teacher_2026
      - ALLOWED_ORIGINS=["http://localhost:5173"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    restart: unless-stopped